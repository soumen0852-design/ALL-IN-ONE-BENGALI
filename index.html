<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALL IN ONE BENGALI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#b30000;
color:white;
text-align:center;
padding:20px;
}

header h1{
font-size:38px;
}

.search{
padding:15px;
text-align:center;
background:white;
}

.search input{
width:90%;
max-width:600px;
padding:12px;
border-radius:30px;
border:1px solid gray;
}

nav{
background:black;
padding:15px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:10px;
font-weight:bold;
}

.breaking{
background:red;
color:white;
padding:12px;
font-weight:bold;
overflow:hidden;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
}

.dark{
background:#111;
color:white;
}

</style>

<script>
function darkMode(){
document.body.classList.toggle("dark");
}
</script>

</head>

<body>

<header>

<h1>ALL IN ONE BENGALI</h1>

<p>
বাংলা খবর | গল্প | টেক | খেলাধুলা
</p>

<br>

<button onclick="darkMode()">
🌙 Dark Mode
</button>

</header>

<div class="search">

<input type="text"
placeholder="🔍 Search News">

</div>

<nav>

<a href="#">🏠 Home</a>

<a href="#">📰 News</a>

<a href="#">📖 Story</a>

<a href="#">⚽ Sports</a>

<a href="#">💻 Tech</a>

<a href="#">📺 Videos</a>

<a href="#">📞 Contact</a>

</nav>

<div class="breaking">

🔥 BREAKING NEWS : ALL IN ONE BENGALI-তে আপনাকে স্বাগতম

</div>

</body>
</html>
